name: Build Command Manager

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS (Apple Silicon ARM64) ───────────────────────────────
          - name: macOS-ARM64
            runner: macos-latest
            artifact_name: CommandManager-macOS-ARM64
            asset_ext: ""

          # ── macOS (Intel x86_64) → SELF-HOSTED ────────────────────────
          - name: macOS-Intel
            runner: [self-hosted, macOS, X64]
            artifact_name: CommandManager-macOS-Intel
            asset_ext: ""

          # ── Windows ───────────────────────────────────────────────────
          - name: Windows
            runner: windows-latest
            artifact_name: CommandManager-Windows
            asset_ext: ".exe"

          # ── Linux ─────────────────────────────────────────────────────
          - name: Linux
            runner: ubuntu-latest
            artifact_name: CommandManager-Linux
            asset_ext: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tkinter (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        env:
          PYTHONUTF8: "1"
        run: python build.py --onefile --clean

      - name: Rename artifact (macOS / Linux)
        if: runner.os != 'Windows'
        run: mv dist/CommandManager dist/${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item -Path dist\CommandManager.exe -NewName CommandManager-Windows.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}${{ matrix.asset_ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "Command Manager ${{ github.ref_name }}"
          body: |
            ## ⚡ Command Manager ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | 🍎 macOS (ARM64 / M1+) | `CommandManager-macOS-ARM64` |
            | 🍎 macOS (Intel) | `CommandManager-macOS-Intel` |
            | 🪟 Windows | `CommandManager-Windows.exe` |
            | 🐧 Linux | `CommandManager-Linux` |

            ### First run
            **macOS (ARM64):** `chmod +x CommandManager-macOS-ARM64 && ./CommandManager-macOS-ARM64`  
            **macOS (Intel):** `chmod +x CommandManager-macOS-Intel && ./CommandManager-macOS-Intel`  
            **Linux:** `chmod +x CommandManager-Linux && ./CommandManager-Linux`  
            **Windows:** double-click `CommandManager-Windows.exe`
          files: |
            release-assets/CommandManager-macOS-ARM64/CommandManager-macOS-ARM64
            release-assets/CommandManager-macOS-Intel/CommandManager-macOS-Intel
            release-assets/CommandManager-Windows/CommandManager-Windows.exe
            release-assets/CommandManager-Linux/CommandManager-Linux
          draft: false
          prerelease: false
