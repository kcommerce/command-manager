name: Build Command Manager

on:
  push:
    tags:
      - "v*"          # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write     # needed to create GitHub Releases and upload assets

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: CommandManager-macOS
            asset_ext: ""                      # single binary, no extension
          - os: windows-latest
            artifact_name: CommandManager-Windows
            asset_ext: ".exe"
          - os: ubuntu-latest
            artifact_name: CommandManager-Linux
            asset_ext: ""

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Linux — install Tkinter system package ──────────────────────────
      - name: Install Tkinter (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      # ── 4. Install PyInstaller ─────────────────────────────────────────────
      - name: Install PyInstaller
        run: pip install pyinstaller

      # ── 5. Build ───────────────────────────────────────────────────────────
      - name: Build executable
        run: python build.py --onefile --clean

      # ── 6. Rename artifact for upload ─────────────────────────────────────
      - name: Rename artifact (macOS / Linux)
        if: runner.os != 'Windows'
        run: mv dist/CommandManager dist/${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item dist\CommandManager.exe dist\${{ matrix.artifact_name }}.exe

      # ── 7. Upload build artifact (available in Actions UI) ─────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}${{ matrix.asset_ext }}

  # ── Release job — runs after all builds succeed ───────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')   # only on tag pushes

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "Command Manager ${{ github.ref_name }}"
          body: |
            ## ⚡ Command Manager ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | 🍎 macOS | `CommandManager-macOS` |
            | 🪟 Windows | `CommandManager-Windows.exe` |
            | 🐧 Linux | `CommandManager-Linux` |

            ### First run
            **macOS:** `chmod +x CommandManager-macOS && ./CommandManager-macOS`
            **Linux:** `chmod +x CommandManager-Linux && ./CommandManager-Linux`
            **Windows:** double-click `CommandManager-Windows.exe`
          files: |
            release-assets/CommandManager-macOS/CommandManager-macOS
            release-assets/CommandManager-Windows/CommandManager-Windows.exe
            release-assets/CommandManager-Linux/CommandManager-Linux
          draft: false
          prerelease: false
